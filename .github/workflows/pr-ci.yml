name: PR CI

on:
  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Clone repository
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 1

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Cache NDK build outputs
      uses: actions/cache@v4
      with:
        path: |
          app/.cxx
          ~/.android/ndk
        key: ndk-${{ hashFiles('app/src/main/cpp/**') }}
        restore-keys: ndk-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode signing keystore
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.jks
        else
          keytool -genkey -v \
            -keystore ${{ github.workspace }}/release.jks \
            -alias winnative \
            -keyalg RSA -keysize 2048 -validity 1 \
            -storepass dummypass -keypass dummypass \
            -dname "CN=CI, OU=CI, O=CI, L=CI, ST=CI, C=US"
        fi

    - name: Build debug APK
      env:
        KEYSTORE_FILE: ${{ github.workspace }}/release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'dummypass' }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'winnative' }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'dummypass' }}
        GRADLE_OPTS: -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.daemon=false
      run: ./gradlew assembleDebug --build-cache --parallel

    - name: Kotlin lint check
      env:
        KEYSTORE_FILE: ${{ github.workspace }}/release.jks
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'dummypass' }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS || 'winnative' }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'dummypass' }}
        GRADLE_OPTS: -Dorg.gradle.parallel=true -Dorg.gradle.caching=true -Dorg.gradle.daemon=false
      run: ./gradlew lintDebug --build-cache --parallel
      continue-on-error: true

    - name: Upload lint report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: lint-report
        path: app/build/reports/lint-results-debug.html
        if-no-files-found: ignore
